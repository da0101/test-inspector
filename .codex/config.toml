# Codex subagent configuration
# Generated by agentboard init. Customize agent roles after activation.
# Docs: https://developers.openai.com/codex/subagents

[agents]
max_threads = 4   # max parallel agents running at once
max_depth   = 1   # root agent may spawn children; children cannot spawn further

# ── Generic roles ─────────────────────────────────────────────────────────────
# The LLM replaces these with project-specific roles during activation.
# Add one [[agents.<name>]] block + matching .codex/agents/<name>.toml per role.

[agents.researcher]
description = "Read-only codebase explorer — research, mapping, audit, doc writing"
config_file = "agents/researcher.toml"

[agents.coder]
description = "Implementation agent — writes and edits production code"
config_file = "agents/coder.toml"

[agents.auditor]
description = "Code review, security audit, test writing, verification"
config_file = "agents/auditor.toml"

[agents.mapper]
description = "Fast file discovery, grep, glob — trivial mechanical ops"
config_file = "agents/mapper.toml"
